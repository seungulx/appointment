<!DOCTYPE html>
<html lang="ko">
<head>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 약속해!</title>
    <style>
        * { -webkit-tap-highlight-color: transparent !important; -webkit-tap-highlight-color: rgba(0, 0, 0, 0) !important;}
        body { font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #fce6ef; overflow: hidden; }
        .container { background: #fffcfd; padding: 30px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 300px; height: 420px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; position: relative; }
        .page { display: none; width: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; align-items: center; justify-content: center; position: relative; width: 250px; height: 60px; }
        .option-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 15px; font-size: 14px; cursor: pointer; font-weight: bold; background: #FFFFFF;box-shadow: 0 10px 20px rgba(252, 172, 203, 0.4); color: #d35400; outline: none; transition: none; -webkit-tap-highlight-color: transparent !important; user-select: none; transition: all 0.3s ease !important;}
        .playbutt{
            font-weight: normal;
            color:#292829;
        }
        .playbutt:hover {
            transform:translateY(-5px);}
        /*button:hover, button:active, button:focus { background: #fca7a7 !important; color: #d35400 !important; }*/
        .btn-yes:hover {
          filter: brightness(0.92) !important;
          color: white !important;
          outline: none !important;
          transform: scale(1.1) !important;
        }
        .btn-yes:active{
            filter: brightness(1.2) !important;
        }

        /*.btn-yes { background: #fa7d7d !important; color: white !important; width: 120px; height: 50px; }*/
        .btn-yes {
          background: linear-gradient(135deg, #ff9ebb, #ff6f9c) !important;
          color: white !important;
          width: 120px;
          height: 50px;
          border: none;
          /*transition: transform 0.2s ease-out, filter 0.3s ease, box-shadow 0.3s ease !important;       */
        }
        .btn-no { background: #bdb9b9 !important; color: white !important; width: 120px; height: 50px; }
        .btn-no:hover, .btn-no:active, .btn-no:focus { background: #bdb9b9 !important; color: white !important; }
        .btn-prev { background: #54a0ff !important; color: white !important; width: 60px; height: 30px; font-size: 12px; margin-top: 20px; line-height: 7px;}
        .no-placeholder { width: 120px; height: 50px; }
        .placeInputConfirm {
          /* 기존 style 속성에 있던 내용 */
          width: 100%;
          padding: 10px;
          background: linear-gradient(135deg, #ff9ebb, #ff6f9c) !important;
          color: white !important;
          border: none !important;
          border-radius: 10px;
          font-weight: bold;
          margin-bottom: 5px;
          cursor: pointer;
          /* 부드러운 움직임을 위한 설정 */
          transition: all 0.3s ease !important;
          cursor: pointer;}
        .dashed-line {
            border-bottom: 1px dashed #d35400; /* 색상이나 두께는 조절 가능 */
            margin: 10px 0; /* 위아래 간격 */
            width: 100%;}
        .placeInputConfirm:hover {
          filter: brightness(1.1) !important;
/*          color: white !important;
          outline: none !important;*/
          transform: scale(1.05) !important;
        }
        .placeInputConfirm:active{
            filter: brightness(0.92) !important;
        }

        #noBtn { position: absolute; z-index: 100; touch-action: none; transition: transform 0.1s ease-out; right: 0; top: 5px; }
        #messageBox { position: absolute; top: 15px; color: #ff7675; font-weight: bold; display: none; font-size: 14px; z-index: 10; }
        input { width: 80%; padding: 15px; margin-bottom: 10px; border: 2px solid #ffeaa7; border-radius: 15px; box-sizing: border-box; border-color:#ffb8b8; background-color:#fcf7f9;}
        .label-text { font-size: 14px; font-weight: bold; color: #555; margin-bottom: 2px; align-self: flex-start; margin-left: 30px; }
    </style>
</head>
<body>

<form class="container" action="https://script.google.com/macros/s/AKfycby4VKF6jZg7VqURUo1JBdG-sr3f-a4LlygjSmyPX0F_iueaSHYc9iBqONCN6HBl70-wnA/exec" id="mainForm">
    <div id="messageBox">날짜랑 시간을 알려줘야 만날 수 있어! 🥺</div>

    <div id="page1" class="page active">
        <h2>약속 잡을까? 🥺</h2>
        <div class="button-group">
            <button type="button" class="btn-yes" onclick="nextPage(2)">좋아!</button>
            <div class="no-placeholder"></div>
            <button type="button" class="btn-no" id="noBtn">싫어</button>
        </div>
    </div>

    <div id="page2" class="page">
        <h2>진짜 좋다고? 😳</h2>
        <h4>좋다고 할 줄 몰랐어..</h4>
        <button type="button" class="btn-yes" onclick="nextPage(3)">그럼~</button>
    </div>

    <div id="page3" class="page">
        <h2>언제가 좋아? 📅</h2>
        <div class="label-text">날짜 📅</div>
        <input type="date" name="date" id="dateInput">
        <div class="label-text">시간 ⏰</div>
        <input type="time" name="time" id="timeInput">
        <button type="button" class="btn-yes" onclick="checkAndNext()" style="margin-top: 15px;">이때!</button>
    </div>

    <div id="page4" class="page">
        <h2>뭐 하고 싶어? 🎨</h2>
        <input type="hidden" name="activity" id="activityInput">
        <div class="option-group">
            <button type="button" class="playbutt" onclick="setActivity(true, '영화')">영화 🎬</button>
            <button type="button" class="playbutt" onclick="setActivity(true, '밥')">밥 🍚</button>
            <button type="button" class="playbutt" onclick="setActivity(true, '술')">술 🍺</button>
            <button type="button" class="playbutt" onclick="setActivity(true, '운동')">운동 🏓</button>
            <button type="button" class="playbutt" style="grid-column: span 2;" onclick="nextPage(5)">기타</button>
        </div>
        <button type="button" class="btn-prev" onclick="nextPage(3)">이전</button>
    </div>

    <div id="page5" class="page">
        <h2>어떤 거 하고 싶어? 📝</h2>
        <input type="text" id="customActivity" placeholder="알려줘!">
        <button type="button" class="btn-yes" onclick="setActivity(false)" style="margin-top: 20px">다음</button>
        <button type="button" class="btn-prev" onclick="nextPage(4)">이전</button>
    </div>

    <div id="page6" class="page">
        <p style="margin:3px; color: #ff6f9c; font-size: 20px; font-weight: bold;" id="getActivity"></p>
        <h2>너가 누군지 알려줄래? 😊</h2>
        <input type="text" id="nameInput" name="name" placeholder="이름 입력">
        <button type="button" class="btn-yes" onclick="updateSummary()" style="margin-top: 20px;">다음</button>
        <button type="button" class="btn-prev" onclick="nextPage(4)">이전</button>
    </div>

    <div id="page7" class="page">
        <p style="margin: 0 0 10px 0; font-size: 17px; font-weight: bold;" id="summaryName"></p>
        <h2 style="font-size: 18px; margin: 0 0 10px 0;">싫다고 안 해줘서 기뻐! 🥰</h2>
        <p style="font-size: 13px; margin: 1px;"><span id="displayTime"></span>시에 내가 데리러 갈게!</p>
        <p style="font-size: 13px; margin: 1px;">재밌게 놀아보자! 기대 돼!✨</p>
        <div style="border: 2px solid #fcc5e1; padding: 10px; border-radius: 15px; width: 90%; margin-top: 10px; background: #fcf5f9; text-align: left;">
            <p style="color:#ff94cc; margin: 0px 0 5px 0; font-weight: bold; font-size: 15px; text-align: center;">💌 데이트 약속</p>
            <p style="color: #424242; margin:3px; font-size: 14px;" id="summaryDate"></p>
            <div class="dashed-line"></div>
            <p style="color: #424242; margin:3px; font-size: 14px;" id="summaryTime"></p>
            <div class="dashed-line"></div>
            <p style="color: #424242; margin:3px; font-size: 14px;" id="summaryActivity"></p>
            <div id="placeContainer"></div>
        </div>
        <button type="submit" id="submitBtn" class="btn-yes" style="margin-top: 15px;">전송하기</button>
        <div id="extraArea" style="display: flex; gap: 30px; margin-top: 10px;">
            <button type="button" id="placeBtn" onclick="document.getElementById('placeModal').style.display = 'flex'" style="display: none; background: linear-gradient(135deg, #ff9ebb, #ff6f9c) !important; color: white; width: 80px; height: 30px; font-size: 11px; padding: 0; border: none; border-radius: 15px; font-weight: bold;">장소 추가</button>
            <button type="button" onclick="handleReload()" style="margin: 0; width: 80px; height: 30px; font-size: 11px; padding: 0; background-color:#54a0ff; color: white">약속 또 잡기</button>
        </div>
    </div>
</form>

<div id="placeModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: white; padding: 20px; border-radius: 20px; width: 250px; text-align: center;">
        <p style="font-weight: bold; margin-bottom: 5px;">어디서 볼까?</p>
        <p id="placeError" style="color: #ff7675; font-weight: bold; display: none; font-size: 12px; margin: 0 0 5px 0;">뭐라고?</p>
        <input type="text" id="placeInput" placeholder="장소 입력" style="width: 100%; box-sizing: border-box; margin-bottom: 5px;">
        <button type="button" class="placeInputConfirm" onclick="submitPlace()">확인</button>
        <button type="button" onclick="closePlaceModal()" style="width: 100%; padding: 10px; background: #dfe6e9; color: #636e72; border: none; border-radius: 10px; font-weight: bold;">취소</button>
    </div>
</div>

<script>
    let savedName;
    function closePlaceModal() {
        document.getElementById('placeModal').style.display = 'none';
        document.getElementById('placeError').style.display = 'none';
        document.getElementById('placeInput').value = '';
    }
    function setActivity(isPreset, presetName) {
        if (!isPreset) {
            let customVal = document.getElementById('customActivity').value.trim();
            if (customVal === "") {
                document.getElementById('messageBox').innerText = "뭐?";
                document.getElementById('messageBox').style.display = 'block';
                return;
            }
        }
        let val = isPreset ? presetName : document.getElementById('customActivity').value;
        document.getElementById('activityInput').value = val;
        document.getElementById('getActivity').innerText = document.getElementById('activityInput').value;
        nextPage(6);
    }

    function updateSummary() {
        let nameVal = document.getElementById('nameInput').value.trim();
        
        if (nameVal === "") {
            document.getElementById('messageBox').innerText = "너가 누군데!!";
            document.getElementById('messageBox').style.display = 'block';
            return;
        }
        savedName = nameVal;
        document.getElementById('summaryName').innerText = nameVal + "!";
        document.getElementById('summaryDate').innerText = "날짜: " + document.getElementById('dateInput').value;
        document.getElementById('summaryTime').innerText = "시간: " + document.getElementById('timeInput').value;
        document.getElementById('summaryActivity').innerText = "내용: " + document.getElementById('activityInput').value;
        document.getElementById('displayTime').innerText = document.getElementById('timeInput').value;
        nextPage(7);
        confetti();
    }

    function nextPage(pageNum) {
        document.getElementById('messageBox').style.display = 'none';
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageNum).classList.add('active');
        if(pageNum === 1) noBtn.style.transform = 'translate(0, 0)';
    }

    function checkAndNext() {
        if(!document.getElementById('dateInput').value || !document.getElementById('timeInput').value) {
            document.getElementById('messageBox').style.display = 'block';
            return;
        }
        nextPage(4);
    }

    function handleReload() {
        let count = parseInt(sessionStorage.getItem('clickCount') || '0');
        count++;
        if (count >= 3) {
            alert("적당히 하지?");
        } else {
            sessionStorage.setItem('clickCount', count.toString());
            location.reload();
        }
    }

    function submitPlace() {
    let placeVal = document.getElementById('placeInput').value.trim();
    if (placeVal === "") {
            placeError.style.display = 'block'; // 에러 메시지 표시
            return; // 함수 종료
    }
    let container = document.getElementById('placeContainer');
    

    let formData = new FormData();
    formData.append('type', 'place');
    formData.append('place', placeVal);
    formData.append('name', savedName);
    
    fetch("https://script.google.com/macros/s/AKfycby4VKF6jZg7VqURUo1JBdG-sr3f-a4LlygjSmyPX0F_iueaSHYc9iBqONCN6HBl70-wnA/exec", {
        method: 'POST',
        mode: 'no-cors',
        body: formData
    });
    
    setTimeout(function() {
        alert(placeVal + " 확인했어~");
        closePlaceModal();
        container.innerHTML = `<div class="dashed-line"></div><p style="margin:3px; font-size: 14px;">장소: ${placeVal}</p>`;
        document.getElementById('placeBtn').style.display = 'none';
    }, 1000);
}

    const noBtn = document.getElementById('noBtn');
    function jumpAway(e) {
        if(e) { e.preventDefault(); e.stopPropagation(); }
        let randomX = (Math.random() * 200) - 100;
        let randomY = (Math.random() * 200) - 100;
        noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
    }
    noBtn.addEventListener('mouseenter', jumpAway);
    noBtn.addEventListener('touchstart', jumpAway, { passive: false });
    noBtn.addEventListener('click', jumpAway);

   document.getElementById('mainForm').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch(this.action, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: new FormData(this) 
        });
        setTimeout(function() {
            alert("잘 전달되었어. 그때 보자~");
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('placeBtn').style.display = 'block';
        }, 2000);
    });
</script>
</body>
</html>
