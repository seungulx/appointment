<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리 약속해!</title>
    <style>
        * { -webkit-tap-highlight-color: transparent !important; -webkit-tap-highlight-color: rgba(0, 0, 0, 0) !important;}
        body { font-family: 'Pretendard', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #fff0f5; overflow: hidden; }
        .container { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 300px; height: 420px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; position: relative; }
        .page { display: none; width: 100%; flex-direction: column; align-items: center; }
        .active { display: flex; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; align-items: center; justify-content: center; position: relative; width: 250px; height: 60px; }
        .option-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 15px; font-size: 14px; cursor: pointer; font-weight: bold; background: #ffeaa7; color: #d35400; outline: none; box-shadow: none; transition: none; -webkit-tap-highlight-color: transparent !important; user-select: none;}
        button:hover, button:active, button:focus { background: #ffeaa7 !important; color: #d35400 !important; }
        .btn-yes { background: #ff9f43 !important; color: white !important; width: 120px; height: 50px; }
        .btn-no { background: #54a0ff !important; color: white !important; width: 120px; height: 50px; }
        .btn-no:hover, .btn-no:active, .btn-no:focus { background: #54a0ff !important; color: white !important; }
        .btn-prev { background: #54a0ff !important; color: white !important; width: 60px; height: 30px; font-size: 12px; margin-top: 20px; }
        .no-placeholder { width: 120px; height: 50px; }
        #noBtn { position: absolute; z-index: 100; touch-action: none; transition: transform 0.1s ease-out; right: 0; top: 5px; }
        #messageBox { position: absolute; top: 15px; color: #ff7675; font-weight: bold; display: none; font-size: 14px; z-index: 10; }
        input { width: 80%; padding: 15px; margin-bottom: 10px; border: 2px solid #ffeaa7; border-radius: 15px; box-sizing: border-box; }
        .label-text { font-size: 14px; font-weight: bold; color: #555; margin-bottom: 2px; align-self: flex-start; margin-left: 30px; }
    </style>
</head>
<body>

<form class="container" action="https://script.google.com/macros/s/AKfycbx55Y5CC2oTZIpxz4ZhdeRAoQnbVsR3RVyl6DW_Yb9H8BAPCh6YhEjnGYEPUcVnx9bhOw/exec" id="mainForm">
    <div id="messageBox">날짜랑 시간을 알려줘야 만날 수 있어! 🥺</div>

    <div id="page1" class="page active">
        <h2>약속 잡을까? 🥺</h2>
        <div class="button-group">
            <button type="button" class="btn-yes" onclick="nextPage(2)">좋아!</button>
            <div class="no-placeholder"></div>
            <button type="button" class="btn-no" id="noBtn">싫어..</button>
        </div>
    </div>

    <div id="page2" class="page">
        <h2>진짜 좋다고? 😳</h2>
        <h4>좋다고 할 줄 몰랐어..</h4>
        <button type="button" class="btn-yes" onclick="nextPage(3)">그럼~</button>
    </div>

    <div id="page3" class="page">
        <h2>언제가 좋아? 📅</h2>
        <div class="label-text">날짜 📅</div>
        <input type="date" name="date" id="dateInput">
        <div class="label-text">시간 ⏰</div>
        <input type="time" name="time" id="timeInput">
        <button type="button" class="btn-yes" onclick="checkAndNext()">이때!</button>
    </div>

    <div id="page4" class="page">
        <h2>뭐 하고 놀까? 🎨</h2>
        <input type="hidden" name="activity" id="activityInput">
        <div class="option-group">
            <button type="button" onclick="setActivity(true, '영화')">영화 🎬</button>
            <button type="button" onclick="setActivity(true, '밥')">밥 🍚</button>
            <button type="button" onclick="setActivity(true, '술')">술 🍺</button>
            <button type="button" onclick="setActivity(true, '놀이')">놀이 🎡</button>
            <button type="button" style="grid-column: span 2;" onclick="nextPage(5)">기타</button>
        </div>
        <button type="button" class="btn-prev" onclick="nextPage(3)">이전</button>
    </div>

    <div id="page5" class="page">
        <h2>어떤 거 하고 싶어? 📝</h2>
        <input type="text" id="customActivity" placeholder="알려줘!">
        <button type="button" class="btn-yes" onclick="setActivity(false)">다음</button>
        <button type="button" class="btn-prev" onclick="nextPage(4)">이전</button>
    </div>

    <div id="page6" class="page">
        <h2>너가 누군지 알려줄래? 😊</h2>
        <input type="text" id="nameInput" name="name" placeholder="이름 입력">
        <button type="button" class="btn-yes" onclick="updateSummary()">다음</button>
        <button type="button" class="btn-prev" onclick="nextPage(4)">이전</button>
    </div>

    <div id="page7" class="page">
        <p style="margin:1px; font-size: 17px; font-weight: bold;" id="summaryName"></p>
        <h2 style="font-size: 18px;">싫다고 안 해줘서 기뻐! 🥰</h2>
        <p style="font-size: 13px; margin: 5px;"><span id="displayTime"></span>시에 내가 데리러 갈게!</p>
        <p style="font-size: 13px; margin: 5px;">재밌게 놀아보자! 기대 돼!✨</p>
        <div style="border: 2px solid #ffeaa7; padding: 10px; border-radius: 15px; width: 90%; margin-top: 10px; background: #fffaf0; text-align: left;">
            <p style="margin: 5px 0; font-weight: bold; font-size: 15px;">📅 데이트 약속</p>
            <p style="margin:3px; font-size: 14px;" id="summaryDate"></p>
            <p style="margin:3px; font-size: 14px;" id="summaryTime"></p>
            <p style="margin:3px; font-size: 14px;" id="summaryActivity"></p>
        </div>
        <button type="submit" class="btn-yes" style="margin-top: 15px;">전송하기</button>
        <button type="button" class="btn-no" onclick="handleReload()" style="margin-top: 10px; width: 80px; height: 30px; font-size: 11px; padding: 0;">약속 또 잡기</button>
    </div>
</form>

<script>
    function setActivity(isPreset, presetName) {
        // 기타 입력창(page5)에서 다음 버튼을 누른 경우 체크
        if (!isPreset) {
            let customVal = document.getElementById('customActivity').value.trim();
            if (customVal === "") {
                document.getElementById('messageBox').innerText = "뭐?";
                document.getElementById('messageBox').style.display = 'block';
                return;
            }
        }
        
        let val = isPreset ? presetName : document.getElementById('customActivity').value;
        document.getElementById('activityInput').value = val;
        nextPage(6);
    }

    function updateSummary() {
        let nameVal = document.getElementById('nameInput').value.trim();
        if (nameVal === "") {
            document.getElementById('messageBox').innerText = "너가 누군데!!";
            document.getElementById('messageBox').style.display = 'block';
            return;
        }
        document.getElementById('summaryName').innerText = nameVal + "!";
        document.getElementById('summaryDate').innerText = "날짜: " + document.getElementById('dateInput').value;
        document.getElementById('summaryTime').innerText = "시간: " + document.getElementById('timeInput').value;
        document.getElementById('summaryActivity').innerText = "일정: " + document.getElementById('activityInput').value;
        document.getElementById('displayTime').innerText = document.getElementById('timeInput').value;
        nextPage(7);
    }

    function nextPage(pageNum) {
        document.getElementById('messageBox').style.display = 'none';
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page' + pageNum).classList.add('active');
        if(pageNum === 1) noBtn.style.transform = 'translate(0, 0)';
    }

    function checkAndNext() {
        if(!document.getElementById('dateInput').value || !document.getElementById('timeInput').value) {
            document.getElementById('messageBox').style.display = 'block';
            return;
        }
        nextPage(4);
    }

    let clickCount = 0;
    function handleReload() {
        let count = parseInt(sessionStorage.getItem('clickCount') || '0');
        count++;
        if (count >= 3) {
            alert("적당히 하지?");
        } else {
            sessionStorage.setItem('clickCount', count.toString());
            location.reload();
        }
    }

    const noBtn = document.getElementById('noBtn');
    const container = document.querySelector('.container');
    function jumpAway(e) {
        if(e) { e.preventDefault(); e.stopPropagation(); }
        const containerRect = container.getBoundingClientRect();
        let randomX = (Math.random() * 200) - 100;
        let randomY = (Math.random() * 200) - 100;
        noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
    }
    noBtn.addEventListener('mouseenter', jumpAway);
    noBtn.addEventListener('touchstart', jumpAway, { passive: false });

    document.getElementById('mainForm').addEventListener('submit', function(e) {
        e.preventDefault();
        fetch(this.action, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: new FormData(this) 
        });
        setTimeout(function() {
            alert("잘 전달되었어. 그떄 보자~ 🥰");
        }, 2000);
    });
</script>
</body>
</html>
